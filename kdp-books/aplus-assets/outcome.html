<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:300px;height:300px;overflow:hidden}
.c{width:300px;height:300px;background:radial-gradient(240px 220px at 50% -10%,#17325c,#0b1a34 72%,#081020);
 font-family:-apple-system,Helvetica,Arial,sans-serif;color:#eef3fb;position:relative;overflow:hidden}
.c:after{content:"";position:absolute;inset:0;border:1px solid #ffffff12}
.hd{position:absolute;top:20px;left:0;right:0;text-align:center;font-family:Georgia,serif;font-size:15px;font-weight:700}
.hd b{color:#c9a24b}
.stack{position:absolute;left:50%;top:150px;transform:translate(-50%,-50%)}
.doc{position:absolute;width:150px;height:110px;border-radius:8px;background:#f3f6fc;
 box-shadow:0 14px 30px #0009;border:1px solid #ffffff30;padding:14px}
.doc .ln{height:6px;border-radius:3px;background:#c3cede;margin:0 0 7px}
.doc .ln.acc{background:#c9a24b;width:52%}
.doc .lbl{position:absolute;bottom:9px;right:12px;font-size:8px;font-weight:700;letter-spacing:.08em;color:#7d8ba3;text-transform:uppercase}
.d1{transform:rotate(-9deg) translate(-52px,6px)}
.d2{transform:rotate(3deg) translate(4px,-6px)}
.d3{transform:rotate(13deg) translate(56px,10px);background:#fbfdff}
.cap{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:10.5px;color:#9fb2cd;letter-spacing:.03em}
</style></head><body><div class="c">
<div class="hd">By Friday, Claude drafts the <b>first pass</b></div>
<div class="stack">
 <div class="doc d1"><div class="ln" style="width:70%"></div><div class="ln acc"></div><div class="ln" style="width:88%"></div><div class="ln" style="width:60%"></div><div class="lbl">Risk note</div></div>
 <div class="doc d3"><div class="ln" style="width:64%"></div><div class="ln" style="width:90%"></div><div class="ln acc"></div><div class="ln" style="width:74%"></div><div class="lbl">Model</div></div>
 <div class="doc d2"><div class="ln" style="width:80%"></div><div class="ln acc"></div><div class="ln" style="width:92%"></div><div class="ln" style="width:66%"></div><div class="lbl">Thesis memo</div></div>
</div>
<div class="cap">Run your first CRAFT prompt in minutes</div>
</div></body></html>
