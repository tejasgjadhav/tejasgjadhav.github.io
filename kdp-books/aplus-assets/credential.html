<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:300px;height:300px;overflow:hidden}
.c{width:300px;height:300px;background:radial-gradient(240px 220px at 50% -10%,#17325c,#0b1a34 72%,#081020);
 font-family:-apple-system,Helvetica,Arial,sans-serif;color:#eef3fb;display:flex;flex-direction:column;
 align-items:center;justify-content:center;text-align:center;padding:26px;position:relative}
.c:after{content:"";position:absolute;inset:0;border:1px solid #ffffff12}
.eye{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#8ea3c2;margin-bottom:12px}
.big{font-family:Georgia,serif;font-weight:700;color:#fff;line-height:1}
.big .n{font-size:52px;color:#c9a24b}
.exp{font-size:12.5px;color:#cdd8ec;font-weight:600;letter-spacing:.04em;margin-top:6px}
.rule{width:56px;height:3px;background:#c9a24b;margin:15px auto 13px}
.name{font-size:14.5px;font-weight:700;color:#eef3fb;letter-spacing:.01em}
.note{margin-top:13px;font-size:9.5px;line-height:1.5;color:#8ea3c2;max-width:224px}
</style></head><body><div class="c">
<div class="eye">Written by</div>
<div class="big"><span class="n">12+ years</span></div>
<div class="exp">in institutional finance — buy-side &amp; research</div>
<div class="rule"></div>
<div class="name">Tejas Jadhav, CFA, FRM</div>
<div class="note">A practitioner's manual — current with the full Claude stack. Names no employers. Gives no investment advice.</div>
</div></body></html>
